services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: proofeat
      POSTGRES_PASSWORD: proofeat_password
      POSTGRES_DB: proofeat
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  ocr:
    build:
      context: ./ocr_service
      dockerfile: Dockerfile
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 5000
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-me}"
      DATABASE_URL: "postgresql://proofeat:proofeat_password@db:5432/proofeat?schema=public"
      OCR_URL: "http://ocr:8000"
    depends_on:
      - db
      - ocr
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_processed:/app/processed

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
  backend_uploads:
  backend_processed:
